name: release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install runtime dependencies (no dev)
        run: composer install --prefer-dist --no-dev --no-interaction --no-progress --optimize-autoloader

      - name: Build release archives
        run: |
          set -euo pipefail
          STAGE="dist/fp-mu-plugin"
          mkdir -p "$STAGE"
          # Ship runtime sources only — no tests, no CI, no source git history.
          cp -R src "$STAGE/"
          cp -R vendor "$STAGE/"
          cp fp-mu-plugin.php composer.json LICENSE README.md "$STAGE/" 2>/dev/null || true
          ( cd dist && tar -czf "fp-mu-plugin-${{ steps.tag.outputs.tag }}.tar.gz" fp-mu-plugin )
          ( cd dist && zip -qr "fp-mu-plugin-${{ steps.tag.outputs.tag }}.zip" fp-mu-plugin )

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/fp-mu-plugin-${{ steps.tag.outputs.tag }}.tar.gz
            dist/fp-mu-plugin-${{ steps.tag.outputs.tag }}.zip
